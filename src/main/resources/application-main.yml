logging:
  level:
    org:
      springframework: info

server:
  port: 8888

spring:
  application:
    name: split-wise-lld
  datasource:
    url: jdbc:mysql://localhost:3306/splitwise
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    jdbc:
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: true